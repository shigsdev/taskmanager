[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [".venv", "venv", "migrations"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "S", "UP", "SIM"]
ignore = [
    "S101",  # assert used (fine in tests)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S105", "S106"]  # test fixtures can hold dummy secrets

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --cov=. --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
omit = [
    "tests/*",
    ".venv/*",
    "venv/*",
]
