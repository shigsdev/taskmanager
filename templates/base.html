<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task Manager{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Tasks">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
</head>
<body>
    <header class="nav">
        <a href="{{ url_for('index') }}" class="brand">Task Manager</a>
        {% block capture %}{% endblock %}
        <nav class="nav-links">
            {% block nav %}{% endblock %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
    <script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js", { scope: "/" })
            .then(function (reg) {
                // Force check for updated SW on every page load
                reg.update();
                // When a new SW is waiting, activate it immediately
                if (reg.waiting) {
                    reg.waiting.postMessage({ type: "SKIP_WAITING" });
                }
                reg.addEventListener("updatefound", function () {
                    var newWorker = reg.installing;
                    newWorker.addEventListener("statechange", function () {
                        if (newWorker.state === "activated") {
                            // New SW active — reload to use fresh assets
                            window.location.reload();
                        }
                    });
                });
            });
        // Reload when a new SW takes over
        navigator.serviceWorker.addEventListener("controllerchange", function () {
            window.location.reload();
        });
    }
    // Clear SW cache on logout so stale authenticated pages aren't served
    document.querySelectorAll('a[href*="/logout"]').forEach(function (link) {
        link.addEventListener("click", function () {
            if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({ type: "CLEAR_CACHE" });
            }
        });
    });
    </script>
</body>
</html>
