# Bandit configuration for the taskmanager project.
# https://bandit.readthedocs.io/en/latest/config.html
#
# Bandit is a security linter for Python. It scans for known-dangerous
# patterns like SQL string concat, pickle on untrusted data, eval/exec,
# subprocess shell injection, etc.

# Exclude paths bandit should not scan.
exclude_dirs:
  - tests          # Tests intentionally use bare assert, mock secrets, etc.
  - .venv
  - .venv-mac
  - venv
  - node_modules
  - migrations     # Auto-generated by Alembic
  - .claude        # Claude Code worktrees / sister-session scratch

# Skip these specific rules with documented reasons.
skips:
  # B101 = assert_used. Bandit flags `assert` because it's stripped in
  # python -O production runs. We don't run with -O on Railway, and our
  # asserts are in helper code (not security boundaries) — login_required
  # uses real `if` checks, not assertions. Tests obviously use assert.
  - B101
  # B404 = subprocess import. We only use subprocess in scripts/ for
  # devops glue (curl, git rev-parse). Never with shell=True. Each call
  # site is reviewed for shell-injection separately.
  - B404
  # B603 = subprocess call. Same justification as B404 — we audit each
  # call site for shell=True and shell-built-from-user-input.
  - B603
# (Severity / confidence filtering happens at the CLI level via
# `-ll -ii` flags in run_all_gates.sh — keeps the gate strict but
# allows ad-hoc `bandit -r .` runs to surface lower-confidence noise.)
