# Daily encrypted Postgres backup → private GitHub repo (#154).
#
# Runs at 03:00 America/New_York every day (07:00 / 08:00 UTC depending
# on DST). Cron is in UTC; we use 07:30 UTC = 03:30 EDT / 02:30 EST so
# we land in the early-morning low-traffic window in either case.
#
# Setup (one-time, by the user):
# 1. Create a private GitHub repo for the backups, e.g. shigsdev/taskmanager-backups
# 2. Generate an SSH deploy key pair: `ssh-keygen -t ed25519 -f backup-key`
# 3. Add the PUBLIC key to taskmanager-backups → Settings → Deploy keys → "Allow write"
# 4. Add the PRIVATE key as a secret in THIS repo: BACKUP_REPO_DEPLOY_KEY
# 5. Generate a Fernet key once: `python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"`
# 6. Save that key in 1Password (you'll need it for restores) AND as a secret
#    in this repo: BACKUP_FERNET_KEY
# 7. Add other secrets: DATABASE_URL (Railway Postgres URL), SENDGRID_API_KEY,
#    DIGEST_FROM_EMAIL, DIGEST_TO_EMAIL
# 8. Set repo variable BACKUP_REPO_URL = git@github.com:<user>/taskmanager-backups.git
#
# To run on demand, use the "workflow_dispatch" trigger from the Actions tab.
name: Daily backup

on:
  schedule:
    - cron: "30 7 * * *"   # 07:30 UTC = 03:30 EDT / 02:30 EST
  workflow_dispatch: {}    # manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo (for the backup script)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install pg_dump v18 + Python deps
        run: |
          # User-reported 2026-05-13: GitHub runners ship pg_dump 16 by
          # default, but Railway's managed Postgres is on v18.3. pg_dump
          # refuses to dump from a newer server. Install the PG 18
          # client tools from the official PGDG repo so we always run a
          # pg_dump that is >= the server version.
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
              https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-18
          # PGDG installs to /usr/lib/postgresql/18/bin — prepend to
          # PATH so `pg_dump` resolves to the 18 binary, not the
          # default 16 one that's still around.
          echo "/usr/lib/postgresql/18/bin" >> $GITHUB_PATH
          /usr/lib/postgresql/18/bin/pg_dump --version
          python -m pip install --upgrade pip
          python -m pip install psycopg[binary] cryptography

      - name: Configure SSH for backup repo push
        env:
          DEPLOY_KEY: ${{ secrets.BACKUP_REPO_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Trust github.com's host key
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
          # Install deploy key
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Run backup
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          BACKUP_FERNET_KEY:   ${{ secrets.BACKUP_FERNET_KEY }}
          BACKUP_REPO_URL:     ${{ vars.BACKUP_REPO_URL }}
          SENDGRID_API_KEY:    ${{ secrets.SENDGRID_API_KEY }}
          DIGEST_FROM_EMAIL:   ${{ vars.DIGEST_FROM_EMAIL }}
          DIGEST_TO_EMAIL:     ${{ vars.DIGEST_TO_EMAIL }}
        run: python scripts/backup_to_github.py
