# Weekly recurring bug-pattern scan (#226).
#
# Runs every Sunday at 13:00 UTC — lands BEFORE Monday so any finding
# is first-thing-Monday context for the operator. Different day from
# #210's Monday-13:00 advisory check so a single morning never gets
# two audit-style emails.
#
# Re-greps the working tree for known-bad shapes we've learned about
# AFTER the code was originally written. The on-commit gates in
# scripts/run_all_gates.sh catch NEW instances; this catches OLD
# instances drifting along in code that hasn't been touched since the
# pattern was added to the cascade.
#
# Setup: no new secrets. Reuses SENDGRID_API_KEY (secret) +
# DIGEST_FROM_EMAIL + DIGEST_TO_EMAIL (vars) — same set the
# daily-backup and weekly-advisory-check workflows already use.
#
# Manual trigger via the Actions UI ("workflow_dispatch") for one-off
# verification.
name: Weekly bug-pattern scan

on:
  schedule:
    # Sundays 13:00 UTC ≈ 08:00 ET (EST) / 09:00 ET (EDT). Lands the
    # day before the work week starts so findings are pre-Monday
    # context, not Monday-morning noise on top of #210's emails.
    - cron: "0 13 * * 0"
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # The bug-pattern scanner is pure-stdlib (no pip deps); the
      # `check_no_string_match_only_tests.py` gate it re-runs is also
      # pure-stdlib. So nothing to install — keep the action lean.

      - name: Run bug-pattern scan
        env:
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
          DIGEST_FROM_EMAIL: ${{ vars.DIGEST_FROM_EMAIL }}
          DIGEST_TO_EMAIL:   ${{ vars.DIGEST_TO_EMAIL }}
        run: python scripts/check_bug_patterns.py
