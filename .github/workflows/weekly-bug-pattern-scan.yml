# Weekly recurring bug-pattern scan (#226).
#
# Runs every Sunday at 13:00 UTC — lands BEFORE Monday so any finding
# is first-thing-Monday context for the operator. Different day from
# #210's Monday-13:00 advisory check so a single morning never gets
# two audit-style emails.
#
# Re-greps the working tree for known-bad shapes we've learned about
# AFTER the code was originally written. The on-commit gates in
# scripts/run_all_gates.sh catch NEW instances; this catches OLD
# instances drifting along in code that hasn't been touched since the
# pattern was added to the cascade.
#
# Setup: no new secrets. Reuses SENDGRID_API_KEY (secret) +
# DIGEST_FROM_EMAIL + DIGEST_TO_EMAIL (vars) — same set the
# daily-backup and weekly-advisory-check workflows already use.
#
# Manual trigger via the Actions UI ("workflow_dispatch") for one-off
# verification.
name: Weekly bug-pattern scan

on:
  schedule:
    # Sundays 13:00 UTC ≈ 08:00 ET (EST) / 09:00 ET (EDT). Lands the
    # day before the work week starts so findings are pre-Monday
    # context, not Monday-morning noise on top of #210's emails.
    - cron: "0 13 * * 0"
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      # #242: `contents: write` so the workflow can commit the
      # `## Auto-filed by recurring audits` updates back to main when
      # the audit's `--autofile` flag changes BACKLOG.md.
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # The bug-pattern scanner is pure-stdlib (no pip deps); the
      # `check_no_string_match_only_tests.py` gate it re-runs is also
      # pure-stdlib. So nothing to install — keep the action lean.

      - name: Run bug-pattern scan
        env:
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
          DIGEST_FROM_EMAIL: ${{ vars.DIGEST_FROM_EMAIL }}
          DIGEST_TO_EMAIL:   ${{ vars.DIGEST_TO_EMAIL }}
        # The audit's exit code is meaningful (1 on findings, 2 on
        # internal error) — DON'T let the autofile commit step block
        # on it. We capture the rc and re-emit it at the end.
        run: |
          python scripts/check_bug_patterns.py --autofile
          echo "AUDIT_RC=$?" >> $GITHUB_ENV
        continue-on-error: true

      - name: Commit BACKLOG.md changes (if any)
        # #242: belt-and-braces — if `--autofile` updated BACKLOG.md
        # (inserts / updates / auto-resolves), commit + push back to
        # main. `[skip ci]` in the message prevents push-triggered
        # workflows from firing on this commit (the recurring audit
        # uses cron triggers anyway, but belt-and-braces).
        run: |
          if [[ -n "$(git status --porcelain BACKLOG.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add BACKLOG.md
            git commit -m "chore(autofile): bug-pattern audit upsert [skip ci]"
            git push
          else
            echo "No BACKLOG.md changes to commit."
          fi

      - name: Re-emit audit exit code
        # Restore the audit's original exit code so workflow status
        # accurately reflects findings vs clean — same UX as before.
        run: exit ${AUDIT_RC:-0}
