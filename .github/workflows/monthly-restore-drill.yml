# Monthly automated restore drill (#154.7).
#
# Runs on the 1st of each month at 04:00 America/New_York. Pulls the
# latest encrypted dump from the backup repo, decrypts it, restores
# into a scratch Postgres in the runner, and validates row counts
# against the live DB. Emails PASS or FAIL.
#
# Why this exists: a backup you've never restored is a 50/50 backup.
# This drill catches dump corruption, key drift, pg_restore version
# skew, and Fernet ciphertext mangling BEFORE the day you actually
# need to restore.
#
# Same secrets as daily-backup.yml, plus the workflow internally
# spins up its own Postgres service container as the restore target.
name: Monthly restore drill

on:
  schedule:
    - cron: "0 8 1 * *"     # 08:00 UTC on the 1st = 04:00 EDT / 03:00 EST
  workflow_dispatch: {}      # manual trigger for ad-hoc drills

jobs:
  drill:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      # Scratch Postgres for the restore target. Same major version
      # as Railway's prod Postgres so pg_restore doesn't trip on
      # version skew. Port-forwarded to the runner; the script reads
      # SCRATCH_DATABASE_URL pointing at localhost:5432.
      # 2026-05-13: bumped 16 → 18 to match Railway's managed Postgres
      # 18.3. Dumps from server v18 can't restore into v16.
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER:     drill
          POSTGRES_PASSWORD: drill
          POSTGRES_DB:       drill
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U drill"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repo (for the drill script)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install pg_restore v18 + Python deps
        run: |
          # Match the server (Railway Postgres 18.3) — runners ship 16
          # by default. Install PG 18 client tools from PGDG so
          # pg_restore is >= the dump's server version.
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
              https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-18
          echo "/usr/lib/postgresql/18/bin" >> $GITHUB_PATH
          /usr/lib/postgresql/18/bin/pg_restore --version
          python -m pip install --upgrade pip
          python -m pip install psycopg[binary] cryptography

      - name: Configure SSH for backup repo read
        env:
          DEPLOY_KEY: ${{ secrets.BACKUP_REPO_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Run restore drill
        env:
          DATABASE_URL:           ${{ secrets.DATABASE_URL }}
          SCRATCH_DATABASE_URL:   postgresql://drill:drill@localhost:5432/drill
          BACKUP_FERNET_KEY:      ${{ secrets.BACKUP_FERNET_KEY }}
          BACKUP_REPO_URL:        ${{ vars.BACKUP_REPO_URL }}
          BREVO_API_KEY:       ${{ secrets.BREVO_API_KEY }}
          DIGEST_FROM_EMAIL:      ${{ vars.DIGEST_FROM_EMAIL }}
          DIGEST_TO_EMAIL:        ${{ vars.DIGEST_TO_EMAIL }}
          # Absolute path — bypasses $PATH-ordering surprises.
          PG_RESTORE_BIN: /usr/lib/postgresql/18/bin/pg_restore
        run: python scripts/restore_drill.py
