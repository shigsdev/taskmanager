# Weekly recurring test-coverage audit (#229).
#
# Runs every Friday at 13:00 UTC — fills the last open weekday in
# the recurring-audit cadence (Mon=#210, Sat=#228, Sun=#226, monthly
# 1st=#227, now Fri=#229). One audit email per day across the
# weekend → Monday window.
#
# Runs the full pytest suite with coverage, compares to the committed
# baseline in docs/audit/coverage-baseline.json, flags:
#   - overall coverage drift > 1pp
#   - per-file drift > 5pp on any file in the baseline
#   - critical-path file below its absolute floor
# (Critical paths: auth.py 90%, task_service.py 85%, crypto.py 95%,
# recurring_service.py 80%, reflection_service.py 80%,
# voice_service.py 70%.)
#
# Always emails (clean or not) so the absence proves the cron failed.
# Needs the BREVO_API_KEY Actions secret (#298 — replaces the retired
# SendGrid key) + DIGEST_*_EMAIL vars.
name: Weekly test-coverage audit

on:
  schedule:
    # Fridays 13:00 UTC ≈ 08:00 ET (EST) / 09:00 ET (EDT).
    - cron: "0 13 * * 5"
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      # #242: `contents: write` so the workflow can commit the
      # `## Auto-filed by recurring audits` updates back to main.
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run coverage audit
        env:
          BREVO_API_KEY:  ${{ secrets.BREVO_API_KEY }}
          DIGEST_FROM_EMAIL: ${{ vars.DIGEST_FROM_EMAIL }}
          DIGEST_TO_EMAIL:   ${{ vars.DIGEST_TO_EMAIL }}
        # See weekly-bug-pattern-scan.yml for the AUDIT_RC pattern.
        run: |
          python scripts/check_test_coverage.py --autofile
          echo "AUDIT_RC=$?" >> $GITHUB_ENV
        continue-on-error: true

      - name: Commit BACKLOG.md changes (if any)
        # #242: see weekly-bug-pattern-scan.yml for the rationale.
        # #247: rebase + retry on push to recover from the race where
        # main advances during the ~3min audit run. Without the rebase
        # the push gets rejected with "Updates were rejected because
        # the remote contains work that you do not have locally" and
        # the autofile commit gets discarded.
        run: |
          if [[ -z "$(git status --porcelain BACKLOG.md)" ]]; then
            echo "No BACKLOG.md changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BACKLOG.md
          git commit -m "chore(autofile): coverage audit upsert [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase origin main || true
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying after backoff..."
            sleep 5
          done
          echo "All push attempts failed."
          exit 1

      - name: Re-emit audit exit code
        run: exit ${AUDIT_RC:-0}
