# Weekly recurring tech-debt audit (#228).
#
# Runs every Saturday at 13:00 UTC — sits BETWEEN the Sunday
# bug-pattern scan (#226) and the Monday advisory check (#210), so
# the operator's inbox gets one audit email per day across the
# weekend → Monday window rather than two on any single morning.
#
# Four checks live in scripts/check_tech_debt.py:
#   - todo-fixme-accumulation  (counts TODO/FIXME/XXX/HACK markers
#                               in production code; flags hotspots
#                               + grand-total ceiling)
#   - dependency-drift         (pip list --outdated + npm outdated;
#                               flags major-version-behind packages)
#   - stale-tests              (test files untouched in > 180 days)
#   - code-duplication (#228b) (npx jscpd over .py + .js; flags any
#                               duplication of 30+ lines)
#
# Always sends an email (clean or not) so the absence of one proves
# the cron failed. Needs the BREVO_API_KEY Actions secret (#298 —
# replaces the retired SendGrid key) + DIGEST_*_EMAIL (no new
# secrets).
name: Weekly tech-debt audit

on:
  schedule:
    # Saturdays 13:00 UTC ≈ 08:00 ET (EST) / 09:00 ET (EDT).
    - cron: "0 13 * * 6"
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      # #242: `contents: write` so the workflow can commit the
      # `## Auto-filed by recurring audits` updates back to main.
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # `git log` for the stale-tests check needs full history,
          # not just the default shallow clone.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # `pip list --outdated` doesn't strictly need the install —
          # it operates on the resolver's view — but installing
          # ensures the version numbers match what `requirements.txt`
          # actually pins, not just what's already on the runner.
          python -m pip install -r requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm deps
        run: npm ci

      - name: Run tech-debt audit
        env:
          BREVO_API_KEY:  ${{ secrets.BREVO_API_KEY }}
          DIGEST_FROM_EMAIL: ${{ vars.DIGEST_FROM_EMAIL }}
          DIGEST_TO_EMAIL:   ${{ vars.DIGEST_TO_EMAIL }}
        # See weekly-bug-pattern-scan.yml for the AUDIT_RC pattern;
        # we need to preserve the audit's meaningful exit code while
        # still running the commit-back step regardless.
        run: |
          python scripts/check_tech_debt.py --autofile
          echo "AUDIT_RC=$?" >> $GITHUB_ENV
        continue-on-error: true

      - name: Commit BACKLOG.md changes (if any)
        # #242: see weekly-bug-pattern-scan.yml for the rationale.
        # #247: rebase + retry on push (see weekly-bug-pattern-scan.yml).
        run: |
          if [[ -z "$(git status --porcelain BACKLOG.md)" ]]; then
            echo "No BACKLOG.md changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BACKLOG.md
          git commit -m "chore(autofile): tech-debt audit upsert [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase origin main || true
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying after backoff..."
            sleep 5
          done
          echo "All push attempts failed."
          exit 1

      - name: Re-emit audit exit code
        run: exit ${AUDIT_RC:-0}
