# Weekly recurring tech-debt audit (#228).
#
# Runs every Saturday at 13:00 UTC — sits BETWEEN the Sunday
# bug-pattern scan (#226) and the Monday advisory check (#210), so
# the operator's inbox gets one audit email per day across the
# weekend → Monday window rather than two on any single morning.
#
# Four checks live in scripts/check_tech_debt.py:
#   - todo-fixme-accumulation  (counts TODO/FIXME/XXX/HACK markers
#                               in production code; flags hotspots
#                               + grand-total ceiling)
#   - dependency-drift         (pip list --outdated + npm outdated;
#                               flags major-version-behind packages)
#   - stale-tests              (test files untouched in > 180 days)
#   - code-duplication (#228b) (npx jscpd over .py + .js; flags any
#                               duplication of 30+ lines)
#
# Always sends an email (clean or not) so the absence of one proves
# the cron failed. Reuses SENDGRID_API_KEY + DIGEST_*_EMAIL (no new
# secrets).
name: Weekly tech-debt audit

on:
  schedule:
    # Saturdays 13:00 UTC ≈ 08:00 ET (EST) / 09:00 ET (EDT).
    - cron: "0 13 * * 6"
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          # `git log` for the stale-tests check needs full history,
          # not just the default shallow clone.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # `pip list --outdated` doesn't strictly need the install —
          # it operates on the resolver's view — but installing
          # ensures the version numbers match what `requirements.txt`
          # actually pins, not just what's already on the runner.
          python -m pip install -r requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm deps
        run: npm ci

      - name: Run tech-debt audit
        env:
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
          DIGEST_FROM_EMAIL: ${{ vars.DIGEST_FROM_EMAIL }}
          DIGEST_TO_EMAIL:   ${{ vars.DIGEST_TO_EMAIL }}
        run: python scripts/check_tech_debt.py
